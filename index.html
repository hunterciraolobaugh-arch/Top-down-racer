<!DOCTYPE html>
<html>
<head>
    <title>Realistic Top-Down Racer</title>
    <style>
        body { margin: 0; background: #333; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #555; border: 5px solid #222; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 600;

const car = {
    x: 400,
    y: 300,
    width: 30,
    height: 50,
    angle: 0,
    speed: 0,
    acceleration: 0.2,
    deceleration: 0.1,
    maxSpeed: 7,
    friction: 0.96,
    steer: 0.06,
    handbrake: 0.85 // Extra friction when space is pressed
};

const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function update() {
    // Gas and Brake (WASD)
    if (keys["w"]) car.speed += car.acceleration;
    if (keys["s"]) car.speed -= car.deceleration;

    // Handbrake (Space)
    if (keys[" "]) {
        car.speed *= car.handbrake;
    }

    // Applying Friction & Speed Caps
    car.speed *= car.friction;
    if (Math.abs(car.speed) > car.maxSpeed) car.speed = car.maxSpeed * Math.sign(car.speed);
    if (Math.abs(car.speed) < 0.1) car.speed = 0;

    // Steering logic (A and D)
    if (car.speed !== 0) {
        // This ensures steering direction reverses when backing up
        const direction = car.speed > 0 ? 1 : -1;
        
        // Steering is more sensitive at medium speeds, harder at high speeds
        const steeringFactor = Math.abs(car.speed) / car.maxSpeed;

        if (keys["a"]) car.angle -= car.steer * direction * steeringFactor;
        if (keys["d"]) car.angle += car.steer * direction * steeringFactor;
    }

    // Position Update based on Angle
    car.x += Math.cos(car.angle) * car.speed;
    car.y += Math.sin(car.angle) * car.speed;

    // Screen Wrap (Keep car on screen)
    if (car.x > canvas.width) car.x = 0;
    if (car.x < 0) car.x = canvas.width;
    if (car.y > canvas.height) car.y = 0;
    if (car.y < 0) car.y = canvas.height;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);
    
    // Car Shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(-car.height / 2 + 5, -car.width / 2 + 5, car.height, car.width);

    // Car Body
    ctx.fillStyle = "#e74c3c"; // Racing Red
    ctx.fillRect(-car.height / 2, -car.width / 2, car.height, car.width);
    
    // Front Windshield (to tell which way is forward)
    ctx.fillStyle = "#34495e";
    ctx.fillRect(car.height / 8, -car.width / 2 + 5, car.height / 4, car.width - 10);
    
    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
